services:
  localdb:
    image: mysql:8.0
    container_name: imposter-local-mysql8
    environment:
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - ./mysql8.cnf:/etc/mysql/conf.d/my.cnf
      - localdb8-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot"]
      interval: 10s
      retries: 10
      start_period: 20s
      timeout: 5s

  db:
    image: mysql:8.0
    container_name: imposter-remote-mysql8
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: TEST_DB
      MYSQL_USER: ADMIN
      MYSQL_PASSWORD: ADMIN
    ports:
      - "3307:3306"
    volumes:
      - db8-data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot"]
      interval: 10s
      retries: 10
      start_period: 20s
      timeout: 5s

volumes:
  localdb8-data:
  db8-data:
